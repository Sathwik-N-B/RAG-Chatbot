<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 18; ry: 18; }
      .box { fill: #1f2937; stroke: #60a5fa; stroke-width: 2.2; rx: 16; ry: 16; }
      .box2 { fill: #172554; stroke: #38bdf8; stroke-width: 2.2; rx: 16; ry: 16; }
      .box3 { fill: #1f2937; stroke: #f59e0b; stroke-width: 2.2; rx: 16; ry: 16; }
      .box4 { fill: #1f2937; stroke: #22c55e; stroke-width: 2.2; rx: 16; ry: 16; }
      .box5 { fill: #1f2937; stroke: #f87171; stroke-width: 2.2; rx: 16; ry: 16; }
      .title { fill: #e5e7eb; font: 700 34px Segoe UI, Arial, sans-serif; }
      .subtitle { fill: #94a3b8; font: 400 16px Segoe UI, Arial, sans-serif; }
      .label { fill: #f8fafc; font: 600 20px Segoe UI, Arial, sans-serif; }
      .small { fill: #cbd5e1; font: 400 15px Segoe UI, Arial, sans-serif; }
      .tiny { fill: #cbd5e1; font: 400 13px Segoe UI, Arial, sans-serif; }
      .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 10 8; }
      .chip { fill: #0b1120; stroke: #475569; stroke-width: 1.5; rx: 12; ry: 12; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#94a3b8" />
    </marker>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1100" />
  <rect x="30" y="30" width="1740" height="1040" fill="url(#grad)" stroke="#334155" stroke-width="2" rx="26" ry="26" />

  <text class="title" x="70" y="92">DeepSeek RAG Chatbot Architecture</text>
  <text class="subtitle" x="70" y="124">Local-first RAG pipeline with optional NVIDIA API, Ollama, GraphRAG, HyDE, and neural reranking</text>

  <!-- User and UI -->
  <rect class="box" x="80" y="180" width="210" height="90" />
  <text class="label" x="185" y="214" text-anchor="middle">User</text>
  <text class="small" x="185" y="242" text-anchor="middle">Ask questions / upload files</text>

  <rect class="box2" x="340" y="150" width="340" height="150" />
  <text class="label" x="510" y="190" text-anchor="middle">Streamlit UI</text>
  <text class="small" x="510" y="220" text-anchor="middle">app.py</text>
  <text class="tiny" x="510" y="248" text-anchor="middle">Sidebar controls, chat history, provider selection</text>
  <text class="tiny" x="510" y="272" text-anchor="middle">RAG toggles: HyDE, reranking, GraphRAG</text>

  <rect class="chip" x="740" y="155" width="290" height="60" />
  <text class="label" x="885" y="192" text-anchor="middle">Session State</text>
  <text class="tiny" x="885" y="214" text-anchor="middle">messages, toggles, retrieval pipeline</text>

  <!-- Ingestion -->
  <rect class="panel" x="80" y="380" width="620" height="250" />
  <text class="label" x="110" y="420">Document Ingestion</text>
  <text class="tiny" x="110" y="446">utils/doc_handler.py</text>

  <rect class="box" x="110" y="470" width="150" height="100" />
  <text class="small" x="185" y="506" text-anchor="middle">Load files</text>
  <text class="tiny" x="185" y="530" text-anchor="middle">PDF / DOCX / TXT</text>

  <rect class="box" x="290" y="470" width="150" height="100" />
  <text class="small" x="365" y="506" text-anchor="middle">Chunk text</text>
  <text class="tiny" x="365" y="530" text-anchor="middle">CharacterTextSplitter</text>

  <rect class="box" x="470" y="470" width="180" height="100" />
  <text class="small" x="560" y="498" text-anchor="middle">Embeddings</text>
  <text class="tiny" x="560" y="522" text-anchor="middle">OllamaEmbeddings</text>
  <text class="tiny" x="560" y="544" text-anchor="middle">FAISS index</text>

  <!-- Retrieval -->
  <rect class="panel" x="740" y="280" width="980" height="420" />
  <text class="label" x="770" y="320">Retrieval and Ranking</text>
  <text class="tiny" x="770" y="346">utils/retriever_pipeline.py + utils/build_graph.py</text>

  <rect class="box3" x="790" y="390" width="200" height="110" />
  <text class="small" x="890" y="426" text-anchor="middle">HyDE Query Expansion</text>
  <text class="tiny" x="890" y="450" text-anchor="middle">Optional synthetic answer</text>
  <text class="tiny" x="890" y="472" text-anchor="middle">Improves recall</text>

  <rect class="box2" x="1030" y="390" width="220" height="110" />
  <text class="small" x="1140" y="426" text-anchor="middle">Hybrid Retrieval</text>
  <text class="tiny" x="1140" y="450" text-anchor="middle">BM25 + FAISS ensemble</text>
  <text class="tiny" x="1140" y="472" text-anchor="middle">Top candidate chunks</text>

  <rect class="box3" x="1290" y="390" width="190" height="110" />
  <text class="small" x="1385" y="426" text-anchor="middle">GraphRAG</text>
  <text class="tiny" x="1385" y="450" text-anchor="middle">Entity overlap</text>
  <text class="tiny" x="1385" y="472" text-anchor="middle">Neighbor expansion</text>

  <rect class="box4" x="790" y="540" width="310" height="110" />
  <text class="small" x="945" y="576" text-anchor="middle">CrossEncoder Reranking</text>
  <text class="tiny" x="945" y="600" text-anchor="middle">Optional neural reranker</text>
  <text class="tiny" x="945" y="622" text-anchor="middle">Sorts by relevance score</text>

  <rect class="chip" x="1140" y="545" width="320" height="100" />
  <text class="small" x="1300" y="580" text-anchor="middle">Top Contexts</text>
  <text class="tiny" x="1300" y="604" text-anchor="middle">Limited by max_contexts</text>

  <!-- Generation -->
  <rect class="panel" x="80" y="690" width="1640" height="320" />
  <text class="label" x="110" y="730">Answer Generation</text>
  <text class="tiny" x="110" y="756">Prompt includes chat history + retrieved context + user question</text>

  <rect class="box4" x="140" y="790" width="360" height="120" />
  <text class="small" x="320" y="828" text-anchor="middle">Prompt Assembly</text>
  <text class="tiny" x="320" y="854" text-anchor="middle">Chat history continuity + retrieved sources</text>
  <text class="tiny" x="320" y="878" text-anchor="middle">Direct, concise answer instructions</text>

  <rect class="box5" x="600" y="790" width="370" height="120" />
  <text class="small" x="785" y="828" text-anchor="middle">LLM Provider Selection</text>
  <text class="tiny" x="785" y="854" text-anchor="middle">Ollama local model or NVIDIA online API</text>
  <text class="tiny" x="785" y="878" text-anchor="middle">Streamed output to chat UI</text>

  <rect class="box" x="1060" y="760" width="250" height="80" />
  <text class="small" x="1185" y="792" text-anchor="middle">Ollama</text>
  <text class="tiny" x="1185" y="816" text-anchor="middle">/api/generate</text>

  <rect class="box" x="1060" y="860" width="250" height="80" />
  <text class="small" x="1185" y="892" text-anchor="middle">NVIDIA z-ai</text>
  <text class="tiny" x="1185" y="916" text-anchor="middle">OpenAI-compatible endpoint</text>

  <rect class="chip" x="1380" y="790" width="300" height="120" />
  <text class="small" x="1530" y="830" text-anchor="middle">Streamed Answer</text>
  <text class="tiny" x="1530" y="856" text-anchor="middle">Displayed incrementally in chat</text>
  <text class="tiny" x="1530" y="880" text-anchor="middle">Saved to session message history</text>

  <!-- Arrows -->
  <path class="arrow" d="M290 225 L340 225" />
  <path class="arrow" d="M510 300 L510 350" />
  <path class="arrow" d="M700 225 L740 225" />
  <path class="arrow" d="M510 300 L510 380" />
  <path class="arrow" d="M185 280 L185 380" />

  <path class="arrow" d="M260 520 L290 520" />
  <path class="arrow" d="M440 520 L470 520" />
  <path class="arrow" d="M650 520 L790 445" />

  <path class="arrow" d="M990 445 L1030 445" />
  <path class="arrow" d="M1250 445 L1290 445" />
  <path class="arrow" d="M1385 500 L945 540" />
  <path class="arrow" d="M1140 500 L1140 545" />
  <path class="arrow" d="M1100 595 L1140 595" />

  <path class="arrow" d="M1300 645 L1300 760" />
  <path class="arrow" d="M1310 820 L1380 840" />
  <path class="arrow" d="M1310 910 L1380 870" />
  <path class="arrow" d="M1310 840 L1380 840" />

  <path class="arrow" d="M505 850 L600 850" />
  <path class="arrow" d="M970 850 L1060 800" />
  <path class="arrow" d="M970 850 L1060 900" />
  <path class="arrow" d="M1310 800 L1380 840" />
  <path class="arrow" d="M1310 900 L1380 840" />

  <path class="arrow dashed" d="M185 615 L185 790" />
  <path class="arrow dashed" d="M510 300 L785 790" />

  <!-- Notes -->
  <text class="tiny" x="1700" y="1035" text-anchor="end">Local-first, in-memory RAG chatbot</text>
</svg>